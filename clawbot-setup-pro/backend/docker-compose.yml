services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: clawbot
    ports:
      - "5432:5432"
    volumes:
      - clawbot_pg:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/clawbot
      JWT_SECRET: dev-secret-change-me
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-ClawBot Setup Pro <onboarding@resend.dev>}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  clawbot_pg:
